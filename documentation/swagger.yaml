    OrderCreate:
      type: object
      required: [address_id, items]
      properties:
        address_id:
          type: integer
          example: 1
        items:
          type: array
          items:
            type: object
            required: [dish_id, quantity]
            properties:
              dish_id:
                type: integer
                example: 1
              quantity:
                type: integer
                minimum: 1
                example: 2

    OrderUpdate:
      type: object
      properties:
        address_id:
          type: integer
          example: 1
        manager_id:
          type: integer
          nullable: true
          example: 2
        courier_id:
          type: integer
          nullable: true
