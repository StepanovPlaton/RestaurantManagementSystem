        address_id:
          type: integer
          example: 1
        address:
          $ref: '#/components/schemas/ClientAddress'
        manager_id:
          type: integer
          nullable: true
          example: 2
        manager:
          $ref: '#/components/schemas/Employee'
        courier_id:
          type: integer
          nullable: true
          example: 3
        courier:
          $ref: '#/components/schemas/Employee'
        total_price:
          type: number
          format: decimal
          example: 2400.00
        created_at:
          type: string
          format: date-time
