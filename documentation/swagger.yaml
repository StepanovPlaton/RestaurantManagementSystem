          type: string
          format: date-time
          example: "2024-01-15T11:00:00Z"
        employee_id:
          type: integer
          nullable: true
          example: 2
        employee:
          $ref: '#/components/schemas/Employee'
        client_id:
          type: integer
          nullable: true
