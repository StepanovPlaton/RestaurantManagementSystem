      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        total:
          type: integer
          example: 5

paths:
  /auth/employees/login:
    post:
      tags: [Authentication (Employees)]
      summary: Вход сотрудника
      description: "Доступ: Публичный"
      operationId: employeeLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeLoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Неверные учетные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/employees/refresh:
    post:
      tags: [Authentication (Employees)]
      summary: Обновление access токена сотрудника
      description: "Доступ: Публичный"
      operationId: employeeRefreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
