          example: "newpassword123"
        role_id:
          type: integer
          example: 2
        phone:
          type: string
          example: "+79001234567"
        avatar_id:
          type: integer
          nullable: true
          example: 1
        is_working:
          type: boolean
          example: true

    EmployeePut:
      type: object
