      properties:
        first_name:
          type: string
          example: "Петр"
        last_name:
          type: string
          example: "Петров"
        middle_name:
          type: string
          nullable: true
          example: "Иванович"
        login:
          type: string
          minLength: 4
          maxLength: 16
