openapi: 3.0.3
info:
  title: Restaurant Management System API
  description: |
    API для системы управления рестораном с поддержкой заказов, меню, блюд и управления сотрудниками.

    Система поддерживает раздельную авторизацию для сотрудников и клиентов через JWT токены.

    Роли пользователей:
    - **Admin**: Полный доступ ко всем операциям
    - **Manager**: Управление меню, блюдами, заказами, назначение курьеров
    - **Courier**: Просмотр назначенных заказов, изменение статуса доставки
    - **Client**: Просмотр меню, создание заказов, управление своими данными
  version: 1.0.0
  contact:
    name: API Support
    email: support@restaurant.com

tags:
  - name: Authentication (Employees)
    description: Авторизация для сотрудников
  - name: Authentication (Clients)
    description: Авторизация для клиентов
  - name: Roles
    description: Управление ролями сотрудников
  - name: Employees
    description: Управление сотрудниками
  - name: Clients
    description: Управление клиентами
  - name: Client Addresses
    description: Управление адресами клиентов
  - name: Dishes
    description: Управление блюдами
  - name: Photos
    description: Загрузка и удаление файлов-фотографий
  - name: Avatars
    description: Загрузка и удаление аватаров сотрудников и клиентов
  - name: Menus
    description: Управление меню
  - name: Ingredients
    description: Управление ингредиентами
  - name: Order Statuses
    description: Управление статусами заказов
  - name: Orders
    description: Управление заказами
  - name: Order Items
    description: Управление позициями заказов

components:
  securitySchemes:
    jwtEmployee:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT токен для сотрудников (Admin, Manager, Courier)
    jwtClient:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT токен для клиентов

  schemas:
    EmployeeLoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          minLength: 4
          maxLength: 16
          example: "manager1"
        password:
          type: string
          format: password
          example: "password123"

    ClientLoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          minLength: 4
          maxLength: 16
          example: "client1"
        password:
          type: string
          format: password
          example: "password123"

    ClientRegisterRequest:
      type: object
      required: [first_name, last_name, login, password, email, phone]
      properties:
        first_name:
          type: string
          example: "Иван"
        last_name:
          type: string
          example: "Иванов"
        middle_name:
          type: string
          example: "Петрович"
        login:
          type: string
          minLength: 4
          maxLength: 16
          example: "client1"
        password:
          type: string
          format: password
          minLength: 6
          example: "password123"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        phone:
          type: string
          example: "+79001234567"

    RefreshTokenRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        token_type:
          type: string
          example: "Bearer"
        expires_in:
          type: integer
          description: Время жизни access токена в секундах
          example: 3600

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        exception:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
      example:
        error: "Not Found"
        exception: "Resource not found"
        message: "Dish not found: id=999"
        timestamp: "2024-01-15T10:30:00Z"

    ErrorResponse401:
      type: object
      properties:
        error:
          type: string
        exception:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
      example:
        error: "Unauthorized"
        exception: "Unauthorized"
        message: "Неверный логин или пароль"
        timestamp: "2024-01-15T10:30:00Z"

    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: "Validation Error"
        message:
          type: string
          example: "Invalid input data"
        fields:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            login: ["Длина логина должна быть от 4 до 16 символов"]
            password: ["Пароль обязателен"]

    Role:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Admin"

    Employee:
      type: object
      required: [id, first_name, last_name, login, role_id]
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: "Петр"
        last_name:
          type: string
          example: "Петров"
        middle_name:
          type: string
          nullable: true
          example: "Иванович"
        login:
          type: string
          example: "manager1"
        role_id:
          type: integer
          example: 2
        role:
          $ref: '#/components/schemas/Role'
        phone:
          type: string
          example: "+79001234567"
        avatar_id:
          type: integer
          nullable: true
          example: 1
        is_working:
          type: boolean
          example: true

    EmployeeCreate:
      type: object
      required: [first_name, last_name, login, password, role_id, phone]
