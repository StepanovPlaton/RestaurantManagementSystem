openapi: 3.0.3
info:
  title: Restaurant Management System API
  description: |
    API для системы управления рестораном с поддержкой заказов, меню, блюд и управления сотрудниками.
    
    Система поддерживает раздельную авторизацию для сотрудников и клиентов через JWT токены.
    
    Роли пользователей:
    - **Admin**: Полный доступ ко всем операциям
    - **Manager**: Управление меню, блюдами, заказами, назначение курьеров
    - **Courier**: Просмотр назначенных заказов, изменение статуса доставки
    - **Client**: Просмотр меню, создание заказов, управление своими данными
  version: 1.0.0
  contact:
    name: API Support
    email: support@restaurant.com

tags:
  - name: Authentication (Employees)
    description: Авторизация для сотрудников
  - name: Authentication (Clients)
    description: Авторизация для клиентов
  - name: Roles
    description: Управление ролями сотрудников
  - name: Employees
    description: Управление сотрудниками
  - name: Clients
    description: Управление клиентами
  - name: Client Addresses
    description: Управление адресами клиентов
  - name: Dishes
    description: Управление блюдами
  - name: Menus
    description: Управление меню
  - name: Ingredients
    description: Управление ингредиентами
  - name: Order Statuses
    description: Управление статусами заказов
  - name: Orders
    description: Управление заказами
  - name: Order Items
    description: Управление позициями заказов

components:
  securitySchemes:
    jwtEmployee:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT токен для сотрудников (Admin, Manager, Courier)
    jwtClient:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT токен для клиентов

  schemas:
    # Authentication schemas
    EmployeeLoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
          minLength: 4
          maxLength: 16
          example: "manager1"
        password:
          type: string
          format: password
          example: "password123"
    
    ClientLoginRequest:
      type: object
      required:
        - login
        - password
      properties:
        login:
          type: string
          minLength: 4
          maxLength: 16
          example: "client1"
        password:
          type: string
          format: password
          example: "password123"
    
    ClientRegisterRequest:
      type: object
      required:
        - first_name
        - last_name
        - login
        - password
        - email
        - phone
      properties:
        first_name:
          type: string
          example: "Иван"
        last_name:
          type: string
          example: "Иванов"
        middle_name:
          type: string
          example: "Петрович"
        login:
          type: string
          minLength: 4
          maxLength: 16
          example: "client1"
        password:
          type: string
          format: password
          minLength: 6
          example: "password123"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        phone:
          type: string
          example: "+79001234567"
    
    RefreshTokenRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        token_type:
          type: string
          example: "Bearer"
        expires_in:
          type: integer
          description: Время жизни access токена в секундах
          example: 3600
    
    # Error schemas
    ErrorResponse:
      type: object
      required:
        - error
        - exception
      properties:
        error:
          type: string
          description: Заголовок ошибки (тип ошибки)
          example: "Internal Server Error"
        exception:
          type: string
          description: Описание ошибки (детальное сообщение об ошибке)
          example: "An unexpected error occurred while processing the request"
        message:
          type: string
          description: Краткое сообщение об ошибке (опционально)
          example: "Invalid credentials"
        details:
          type: object
          description: Дополнительные детали об ошибке (опционально)
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
          description: Время возникновения ошибки (опционально)
          example: "2024-01-15T10:30:00Z"
    
    ValidationError:
      type: object
      properties:
        error:
          type: string
          example: "Validation Error"
        message:
          type: string
          example: "Invalid input data"
        fields:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            login: ["Login must be between 4 and 16 characters"]
            password: ["Password is required"]
    
    # Entity schemas
    Role:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Admin"
      required:
        - id
        - name
    
    Employee:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: "Петр"
        last_name:
          type: string
          example: "Петров"
        middle_name:
          type: string
          nullable: true
          example: "Иванович"
        login:
          type: string
          example: "manager1"
        role_id:
          type: integer
          example: 2
        role:
          $ref: '#/components/schemas/Role'
        phone:
          type: string
          example: "+79001234567"
        avatar_id:
          type: integer
          nullable: true
          example: 1
        is_working:
          type: boolean
          example: true
      required:
        - id
        - first_name
        - last_name
        - login
        - role_id
    
    EmployeeCreate:
      type: object
      required:
        - first_name
        - last_name
        - login
        - password
        - role_id
        - phone
      properties:
        first_name:
          type: string
          example: "Петр"
        last_name:
          type: string
          example: "Петров"
        middle_name:
          type: string
          example: "Иванович"
        login:
          type: string
          minLength: 4
          maxLength: 16
          example: "manager1"
        password:
          type: string
          format: password
          example: "password123"
        role_id:
          type: integer
          example: 2
        phone:
          type: string
          example: "+79001234567"
        avatar_id:
          type: integer
          nullable: true
          example: 1
        is_working:
          type: boolean
          default: false
          example: false
    
    EmployeeUpdate:
      type: object
      properties:
        first_name:
          type: string
          example: "Петр"
        last_name:
          type: string
          example: "Петров"
        middle_name:
          type: string
          nullable: true
          example: "Иванович"
        login:
          type: string
          minLength: 4
          maxLength: 16
          example: "manager1"
        password:
          type: string
          format: password
          example: "newpassword123"
        role_id:
          type: integer
          example: 2
        phone:
          type: string
          example: "+79001234567"
        avatar_id:
          type: integer
          nullable: true
          example: 1
        is_working:
          type: boolean
          example: true
    
    Client:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: "Иван"
        last_name:
          type: string
          example: "Иванов"
        middle_name:
          type: string
          nullable: true
          example: "Петрович"
        login:
          type: string
          example: "client1"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        phone:
          type: string
          example: "+79001234567"
        avatar_id:
          type: integer
          nullable: true
          example: 1
      required:
        - id
        - first_name
        - last_name
        - login
        - email
        - phone
    
    ClientCreate:
      type: object
      required:
        - first_name
        - last_name
        - login
        - password
        - email
        - phone
      properties:
        first_name:
          type: string
          example: "Иван"
        last_name:
          type: string
          example: "Иванов"
        middle_name:
          type: string
          example: "Петрович"
        login:
          type: string
          minLength: 4
          maxLength: 16
          example: "client1"
        password:
          type: string
          format: password
          example: "password123"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        phone:
          type: string
          example: "+79001234567"
        avatar_id:
          type: integer
          nullable: true
          example: 1
    
    ClientUpdate:
      type: object
      properties:
        first_name:
          type: string
          example: "Иван"
        last_name:
          type: string
          example: "Иванов"
        middle_name:
          type: string
          nullable: true
          example: "Петрович"
        login:
          type: string
          minLength: 4
          maxLength: 16
          example: "client1"
        password:
          type: string
          format: password
          example: "newpassword123"
        email:
          type: string
          format: email
          example: "ivan@example.com"
        phone:
          type: string
          example: "+79001234567"
        avatar_id:
          type: integer
          nullable: true
          example: 1
    
    ClientAddress:
      type: object
      properties:
        id:
          type: integer
          example: 1
        client_id:
          type: integer
          example: 1
        address_text:
          type: string
          example: "г. Москва, ул. Ленина, д. 10, кв. 5"
      required:
        - id
        - client_id
        - address_text
    
    ClientAddressCreate:
      type: object
      required:
        - address_text
      properties:
        address_text:
          type: string
          example: "г. Москва, ул. Ленина, д. 10, кв. 5"
    
    ClientAddressUpdate:
      type: object
      properties:
        address_text:
          type: string
          example: "г. Москва, ул. Ленина, д. 10, кв. 5"
    
    Dish:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Стейк из говядины"
        weight:
          type: number
          format: float
          example: 300.5
        calories:
          type: integer
          example: 450
        price:
          type: number
          format: decimal
          example: 1200.00
        description:
          type: string
          example: "Сочный стейк из мраморной говядины"
      required:
        - id
        - name
        - weight
        - calories
        - price
    
    DishCreate:
      type: object
      required:
        - name
        - weight
        - calories
        - price
      properties:
        name:
          type: string
          example: "Стейк из говядины"
        weight:
          type: number
          format: float
          example: 300.5
        calories:
          type: integer
          example: 450
        price:
          type: number
          format: decimal
          example: 1200.00
        description:
          type: string
          example: "Сочный стейк из мраморной говядины"
    
    DishUpdate:
      type: object
      properties:
        name:
          type: string
          example: "Стейк из говядины"
        weight:
          type: number
          format: float
          example: 300.5
        calories:
          type: integer
          example: 450
        price:
          type: number
          format: decimal
          example: 1200.00
        description:
          type: string
          example: "Сочный стейк из мраморной говядины"
    
    Photo:
      type: object
      properties:
        id:
          type: integer
          example: 1
        path:
          type: string
          example: "/uploads/photos/dish1.jpg"
      required:
        - id
        - path
    
    PhotoCreate:
      type: object
      required:
        - path
      properties:
        path:
          type: string
          example: "/uploads/photos/dish1.jpg"
    
    PhotoUpdate:
      type: object
      properties:
        path:
          type: string
          example: "/uploads/photos/dish1.jpg"
    
    DishPhoto:
      type: object
      properties:
        dish_id:
          type: integer
          example: 1
        photo_id:
          type: integer
          example: 1
        dish:
          $ref: '#/components/schemas/Dish'
        photo:
          $ref: '#/components/schemas/Photo'
    
    DishPhotoCreate:
      type: object
      required:
        - photo_id
      properties:
        photo_id:
          type: integer
          example: 1
    
    Avatar:
      type: object
      properties:
        id:
          type: integer
          example: 1
        path:
          type: string
          example: "/uploads/avatars/user1.jpg"
      required:
        - id
        - path
    
    AvatarCreate:
      type: object
      required:
        - path
      properties:
        path:
          type: string
          example: "/uploads/avatars/user1.jpg"
    
    AvatarUpdate:
      type: object
      properties:
        path:
          type: string
          example: "/uploads/avatars/user1.jpg"
    
    Menu:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Летнее меню"
        seasonality:
          type: string
          example: "Лето"
        is_active:
          type: boolean
          example: true
      required:
        - id
        - name
        - seasonality
        - is_active
    
    MenuCreate:
      type: object
      required:
        - name
        - seasonality
      properties:
        name:
          type: string
          example: "Летнее меню"
        seasonality:
          type: string
          example: "Лето"
        is_active:
          type: boolean
          default: false
          example: true
    
    MenuUpdate:
      type: object
      properties:
        name:
          type: string
          example: "Летнее меню"
        seasonality:
          type: string
          example: "Лето"
        is_active:
          type: boolean
          example: true
    
    MenuDish:
      type: object
      properties:
        menu_id:
          type: integer
          example: 1
        dish_id:
          type: integer
          example: 1
        menu:
          $ref: '#/components/schemas/Menu'
        dish:
          $ref: '#/components/schemas/Dish'
    
    MenuDishCreate:
      type: object
      required:
        - dish_id
      properties:
        dish_id:
          type: integer
          example: 1
    
    Ingredient:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Говядина"
      required:
        - id
        - name
    
    IngredientCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Говядина"
    
    IngredientUpdate:
      type: object
      properties:
        name:
          type: string
          example: "Говядина"
    
    DishIngredient:
      type: object
      properties:
        dish_id:
          type: integer
          example: 1
        ingredient_id:
          type: integer
          example: 1
        dish:
          $ref: '#/components/schemas/Dish'
        ingredient:
          $ref: '#/components/schemas/Ingredient'
    
    DishIngredientCreate:
      type: object
      required:
        - ingredient_id
      properties:
        ingredient_id:
          type: integer
          example: 1
    
    OrderStatus:
      type: object
      properties:
        id:
          type: integer
          example: 1
        status_name:
          type: string
          example: "Новый"
      required:
        - id
        - status_name
    
    OrderStatusCreate:
      type: object
      required:
        - status_name
      properties:
        status_name:
          type: string
          example: "Новый"
    
    OrderStatusUpdate:
      type: object
      properties:
        status_name:
          type: string
          example: "Новый"
    
    Order:
      type: object
      properties:
        id:
          type: integer
          example: 1
        client_id:
          type: integer
          example: 1
        client:
          $ref: '#/components/schemas/Client'
        address_id:
          type: integer
          example: 1
        address:
          $ref: '#/components/schemas/ClientAddress'
        manager_id:
          type: integer
          nullable: true
          example: 2
        manager:
          $ref: '#/components/schemas/Employee'
        courier_id:
          type: integer
          nullable: true
          example: 3
        courier:
          $ref: '#/components/schemas/Employee'
        created_at:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
      required:
        - id
        - client_id
        - address_id
        - created_at
    
    OrderCreate:
      type: object
      required:
        - address_id
        - items
      properties:
        address_id:
          type: integer
          example: 1
        items:
          type: array
          items:
            type: object
            required:
              - dish_id
              - quantity
            properties:
              dish_id:
                type: integer
                example: 1
              quantity:
                type: integer
                minimum: 1
                example: 2
    
    OrderUpdate:
      type: object
      properties:
        address_id:
          type: integer
          example: 1
        manager_id:
          type: integer
          nullable: true
          example: 2
        courier_id:
          type: integer
          nullable: true
          example: 3
    
    OrderStatusHistory:
      type: object
      properties:
        id:
          type: integer
          example: 1
        order_id:
          type: integer
          example: 1
        order:
          $ref: '#/components/schemas/Order'
        status_id:
          type: integer
          example: 2
        status:
          $ref: '#/components/schemas/OrderStatus'
        changed_at:
          type: string
          format: date-time
          example: "2024-01-15T11:00:00Z"
        employee_id:
          type: integer
          nullable: true
          example: 2
        employee:
          $ref: '#/components/schemas/Employee'
        client_id:
          type: integer
          nullable: true
          example: 1
        client:
          $ref: '#/components/schemas/Client'
        comment:
          type: string
          example: "Заказ доставлен"
      required:
        - id
        - order_id
        - status_id
        - changed_at
    
    OrderStatusHistoryCreate:
      type: object
      required:
        - status_id
      properties:
        status_id:
          type: integer
          example: 2
        comment:
          type: string
          example: "Заказ доставлен"
    
    OrderItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        order_id:
          type: integer
          example: 1
        order:
          $ref: '#/components/schemas/Order'
        dish_id:
          type: integer
          example: 1
        dish:
          $ref: '#/components/schemas/Dish'
        quantity:
          type: integer
          example: 2
      required:
        - id
        - order_id
        - dish_id
        - quantity
    
    OrderItemCreate:
      type: object
      required:
        - dish_id
        - quantity
      properties:
        dish_id:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2
    
    OrderItemUpdate:
      type: object
      properties:
        dish_id:
          type: integer
          example: 1
        quantity:
          type: integer
          minimum: 1
          example: 2
    
    # List response schemas
    RolesList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        total:
          type: integer
          example: 3
    
    EmployeesList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Employee'
        total:
          type: integer
          example: 10
    
    ClientsList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Client'
        total:
          type: integer
          example: 50
    
    ClientAddressesList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ClientAddress'
        total:
          type: integer
          example: 5
    
    DishesList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Dish'
        total:
          type: integer
          example: 30
    
    PhotosList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Photo'
        total:
          type: integer
          example: 50
    
    MenusList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Menu'
        total:
          type: integer
          example: 4
    
    IngredientsList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'
        total:
          type: integer
          example: 20
    
    OrderStatusesList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderStatus'
        total:
          type: integer
          example: 5
    
    OrdersList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        total:
          type: integer
          example: 100
    
    OrderStatusHistoryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderStatusHistory'
        total:
          type: integer
          example: 10
    
    OrderItemsList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        total:
          type: integer
          example: 5

paths:
  # Authentication endpoints for employees
  /auth/employees/login:
    post:
      tags:
        - Authentication (Employees)
      summary: Вход сотрудника
      description: |
        Аутентификация сотрудника по логину и паролю. Возвращает access и refresh токены.
        
        Доступ: Публичный (без авторизации)
      operationId: employeeLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeLoginRequest'
            example:
              login: "manager1"
              password: "password123"
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                token_type: "Bearer"
                expires_in: 3600
        '401':
          description: Неверные учетные данные
          content:
            application/json:
              schema:
